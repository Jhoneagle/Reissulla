name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: reissulla
          POSTGRES_PASSWORD: reissulla_dev
          POSTGRES_DB: reissulla
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reissulla"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://reissulla:reissulla_dev@localhost:5432/reissulla
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check

      - run: pnpm --filter @reissulla/api db:migrate

      - run: pnpm build

      - run: pnpm test

      # Schema drift gate: re-fetch the OTP2 SDL + per-adapter feed list and
      # fail the build if the committed baselines no longer match. Doubles
      # as the upstream-change alarm for Digitransit feed additions.
      - run: pnpm --filter @reissulla/api test:graphql-snapshot

      - name: Detect Digitransit schema or feed drift
        run: git diff --exit-code apps/api/src/adapters/digitransit-finland/schema.snapshot.graphql apps/api/src/adapters/digitransit-hsl/schema.snapshot.graphql apps/api/src/adapters/digitransit-waltti/schema.snapshot.graphql apps/api/src/adapters/digitransit-varely/schema.snapshot.graphql apps/api/src/adapters/digitransit-finland/feeds.snapshot.json apps/api/src/adapters/digitransit-hsl/feeds.snapshot.json apps/api/src/adapters/digitransit-waltti/feeds.snapshot.json apps/api/src/adapters/digitransit-varely/feeds.snapshot.json

      # E2E suite: install Chromium (cached in the next step's actions
      # cache), then run Playwright against a freshly-started api + web.
      # Single worker so the shared Postgres / Redis isn't fought over
      # across spec files.
      - run: pnpm test:e2e:install

      - run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - run: pnpm format:check
